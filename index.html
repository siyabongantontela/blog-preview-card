<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>Blog Preview</title>
</head>

<body class="bg-(--yellow) flex justify-center items-center h-lvh">
    <main class="bg-(--white) p-5 rounded-2xl border-black border shadow-black shadow-(--shadow)">
        <header class="mb-6">
            <img src="./blog-preview-card-main/assets/images/illustration-article.svg" alt="blog post image"
                class="w-80 rounded-xl">
        </header>
        <section class="w-80 pr-2.5 mb-6">
            <div class="font-figtree bg-(--yellow) inline-block px-3 py-1 rounded font-bold mb-3">Learning</div>
            <small class="font-figtree block mb-4">Published 21 Dec 2023</small>
            <h1 class="font-figtree text-2xl font-bold hover:text-(--yellow) hover:cursor-pointer mb-4">HTML & CSS
                foundations</h1>
            <p class="font-figtree text-(--color-grey-500)">These languages are the backbone of every website, defining
                structure, content, and presentation</p>
        </section>
        <footer class="flex items-center">
            <img src="./blog-preview-card-main/assets/images/image-avatar.webp"
                alt="a tiny image of greg hooper, the author of the article" class="w-9 mr-3">
            <h6 class="font-figtree font-bold">Greg Hooper</h6>
        </footer>
    </main>
</body>

</html>
